<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultArchive Pro | Sistem Arsip Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>

    <div class="container">
        <header class="fade-in">
            <div class="logo">
                <i class="fas fa-box-archive"></i>
                <h1>Vault<span>Archive</span></h1>
            </div>
            <p>Solusi arsip digital: Simpan, Kelola, dan Unduh berkas dalam berbagai format.</p>
        </header>

        <main class="grid-container">
            <!-- Form Section -->
            <section class="card slide-in-left">
                <div class="card-header">
                    <i class="fas fa-file-arrow-up"></i>
                    <h3>Upload Arsip Baru</h3>
                </div>
                <form id="archiveForm">
                    <div class="input-box">
                        <label>Nama Berkas</label>
                        <input type="text" id="fileName" placeholder="Contoh: Laporan Keuangan" required>
                    </div>
                    <div class="input-box">
                        <label>Kategori</label>
                        <input type="text" id="category" placeholder="Surat / Pajak / Ijazah" required>
                    </div>
                    <div class="input-box">
                        <label>Tanggal Dokumen</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="input-box">
                        <label>Pilih File Asli (Maks 2MB)</label>
                        <input type="file" id="fileInput" accept="image/*,application/pdf" required>
                    </div>
                    <button type="submit" id="saveBtn">
                        <span>Amankan Berkas</span>
                        <i class="fas fa-shield-check"></i>
                    </button>
                </form>
            </section>

            <!-- Display Section -->
            <section class="card slide-in-right">
                <div class="card-header">
                    <i class="fas fa-database"></i>
                    <h3>Data Berkas Tersimpan</h3>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Informasi Berkas</th>
                                <th>Kategori</th>
                                <th style="text-align: center;">Export Laporan</th>
                                <th style="text-align: center;">File Asli</th>
                            </tr>
                        </thead>
                        <tbody id="archiveList">
                            <!-- Data dimuat via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
<script type="module">
  // Import SDK Dasar
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  
  // Import SDK tambahan yang kita butuhkan (Database & Storage)
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getStorage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  // Konfigurasi milikmu
  const firebaseConfig = {
    apiKey: "AIzaSyCm94rp7EJcz7U9LKBjcwmhkyyCCTeDfxY",
    authDomain: "arsip-digital-1c79a.firebaseapp.com",
    projectId: "arsip-digital-1c79a",
    storageBucket: "arsip-digital-1c79a.firebasestorage.app",
    messagingSenderId: "935288667143",
    appId: "1:935288667143:web:ed40a042a47f9f5e60fea2"
  };

  // Inisialisasi Firebase
  const app = initializeApp(firebaseConfig);
  
  // Inisialisasi Layanan (Database & Storage)
  const db = getFirestore(app);
  const storage = getStorage(app);

  // PENTING: Agar variabel 'db' dan 'storage' bisa dipakai di file script.js kamu, 
  // kita tempelkan ke objek 'window' global.
  window.db = db;
  window.storage = storage;
</script>
    <script src="script.js"></script>
</body>
</html>
