<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultArchive Pro | Sistem Arsip Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>

    <div class="container">
        <header class="fade-in">
            <div class="logo">
                <i class="fas fa-box-archive"></i>
                <h1>Vault<span>Archive</span></h1>
            </div>
            <p>Solusi arsip digital: Simpan, Kelola, dan Unduh berkas dalam berbagai format (Cloud Edition).</p>
        </header>

        <main class="grid-container">
            <!-- Form Section -->
            <section class="card slide-in-left">
                <div class="card-header">
                    <i class="fas fa-file-arrow-up"></i>
                    <h3>Upload Arsip Baru</h3>
                </div>
                <form id="archiveForm">
                    <div class="input-box">
                        <label>Nama Berkas</label>
                        <input type="text" id="fileName" placeholder="Contoh: Laporan Keuangan" required>
                    </div>
                    <div class="input-box">
                        <label>Kategori</label>
                        <input type="text" id="category" placeholder="Surat / Pajak / Ijazah" required>
                    </div>
                    <div class="input-box">
                        <label>Tanggal Dokumen</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="input-box">
                        <label>Pilih File Asli (PDF/Gambar)</label>
                        <input type="file" id="fileInput" accept="image/*,application/pdf" required>
                    </div>
                    <button type="submit" id="saveBtn">
                        <span>Amankan ke Cloud</span>
                        <i class="fas fa-cloud-upload-alt"></i>
                    </button>
                </form>
            </section>

            <!-- Display Section -->
            <section class="card slide-in-right">
                <div class="card-header">
                    <i class="fas fa-database"></i>
                    <h3>Data Berkas di Server Google</h3>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Informasi Berkas</th>
                                <th>Kategori</th>
                                <th style="text-align: center;">Export Laporan</th>
                                <th style="text-align: center;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="archiveList">
                            <!-- Data akan dimuat dari Firebase Firestore -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- KONFIGURASI FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm94rp7EJcz7U9LKBjcwmhkyyCCTeDfxY",
            authDomain: "arsip-digital-1c79a.firebaseapp.com",
            projectId: "arsip-digital-1c79a",
            storageBucket: "arsip-digital-1c79a.firebasestorage.app",
            messagingSenderId: "935288667143",
            appId: "1:935288667143:web:ed40a042a47f9f5e60fea2"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Ekspos ke window agar script.js bisa mengaksesnya
        window.db = db;
        window.storage = storage;
    </script>

    <!-- PANGGIL FILE JS UTAMA KAMU -->
    <script type="module" src="script.js"></script>
</body>
</html>
